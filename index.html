<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="calc">
        <div class="display"></div>
        <div class="keys">
            <button class="key text num">7</button>
            <button class="key text num">8</button>
            <button class="key text num">9</button>
            <button class="key" id="clear">AC</button>
            <button class="key" id="back">⌫</button>
            <button class="key text num">4</button>
            <button class="key text num">5</button>
            <button class="key text num">6</button>
            <button class="key text operation">+</button>
            <button class="key text operation">-</button>
            <button class="key text num">1</button>
            <button class="key text num">2</button>
            <button class="key text num">3</button>
            <button class="key text operation">×</button>
            <button class="key text operation">÷</button>
            <button class="key text num">0</button>
            <button class="key text num">.</button>
            <button class="key text num">(</button>
            <button class="key text num">)</button>
            <button class="key" id="equal">=</button>
        </div>    
    </div>
    <script src="./script.js"></script>
</body>
</html>
